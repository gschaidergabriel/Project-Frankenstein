<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Face background - green -->
  <rect x="8" y="6" width="32" height="38" rx="4" fill="#4a7c4e"/>
  <!-- Flat top head -->
  <rect x="8" y="6" width="32" height="12" fill="#3d6640"/>
  <!-- Hair/stitches on top -->
  <line x1="14" y1="6" x2="14" y2="12" stroke="#2d4d30" stroke-width="2"/>
  <line x1="24" y1="6" x2="24" y2="12" stroke="#2d4d30" stroke-width="2"/>
  <line x1="34" y1="6" x2="34" y2="12" stroke="#2d4d30" stroke-width="2"/>
  <!-- Bolts on sides -->
  <circle cx="4" cy="24" r="4" fill="#888"/>
  <circle cx="4" cy="24" r="2" fill="#666"/>
  <circle cx="44" cy="24" r="4" fill="#888"/>
  <circle cx="44" cy="24" r="2" fill="#666"/>
  <!-- Eyes -->
  <ellipse cx="17" cy="24" rx="5" ry="6" fill="#fff"/>
  <ellipse cx="31" cy="24" rx="5" ry="6" fill="#fff"/>
  <circle cx="17" cy="25" r="3" fill="#333"/>
  <circle cx="31" cy="25" r="3" fill="#333"/>
  <!-- Eyebrows - angry/determined -->
  <line x1="11" y1="16" x2="22" y2="19" stroke="#2d4d30" stroke-width="3" stroke-linecap="round"/>
  <line x1="37" y1="16" x2="26" y2="19" stroke="#2d4d30" stroke-width="3" stroke-linecap="round"/>
  <!-- Scar/stitch on forehead -->
  <path d="M20 14 L28 14" stroke="#2d4d30" stroke-width="2"/>
  <line x1="21" y1="12" x2="21" y2="16" stroke="#2d4d30" stroke-width="1"/>
  <line x1="24" y1="12" x2="24" y2="16" stroke="#2d4d30" stroke-width="1"/>
  <line x1="27" y1="12" x2="27" y2="16" stroke="#2d4d30" stroke-width="1"/>
  <!-- Nose -->
  <path d="M24 26 L22 33 L26 33 Z" fill="#3d6640"/>
  <!-- Mouth - slight smile -->
  <path d="M16 38 Q24 42 32 38" stroke="#2d4d30" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
