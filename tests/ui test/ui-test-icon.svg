<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89b4fa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#74c7ec;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cursorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bgGrad)"/>
  <circle cx="64" cy="64" r="56" fill="none" stroke="#1e1e2e" stroke-width="2" opacity="0.3"/>

  <!-- Mouse Cursor -->
  <g filter="url(#shadow)" transform="translate(28, 20)">
    <!-- Cursor Body -->
    <path d="M 10 5 L 10 65 L 25 50 L 40 75 L 50 70 L 35 45 L 55 45 Z"
          fill="url(#cursorGrad)"
          stroke="#1e1e2e"
          stroke-width="3"
          stroke-linejoin="round"/>
  </g>

  <!-- Checkmark Badge -->
  <circle cx="100" cy="100" r="22" fill="#a6e3a1"/>
  <circle cx="100" cy="100" r="18" fill="none" stroke="#1e1e2e" stroke-width="2" opacity="0.3"/>
  <path d="M 88 100 L 96 108 L 112 92"
        fill="none"
        stroke="#1e1e2e"
        stroke-width="4"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Small decorative dots (test points) -->
  <circle cx="85" cy="35" r="4" fill="#f9e2af" opacity="0.8"/>
  <circle cx="95" cy="50" r="3" fill="#f38ba8" opacity="0.8"/>
  <circle cx="80" cy="55" r="3" fill="#a6e3a1" opacity="0.8"/>
</svg>
