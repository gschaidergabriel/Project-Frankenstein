<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="8" y="8" width="240" height="240" rx="40" ry="40" fill="url(#bg)" stroke="url(#glow)" stroke-width="4"/>
  <!-- Subtle inner glow -->
  <rect x="16" y="16" width="224" height="224" rx="34" ry="34" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <!-- Big W letter -->
  <text x="128" y="190" font-family="sans-serif" font-weight="900" font-size="180" fill="url(#glow)" text-anchor="middle" letter-spacing="-8">W</text>
  <!-- Small pen/write indicator -->
  <line x1="185" y1="50" x2="210" y2="25" stroke="#00d4ff" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <circle cx="213" cy="22" r="4" fill="#00d4ff" opacity="0.7"/>
</svg>
